<!DOCTYPE html>
<html>
<head>
  <title>Grid Columns App</title>

  <style>
    body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2b2b45);
  color: white;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h2 {
  margin-bottom: 15px;
  letter-spacing: 1px;
}

/* Controls */
input {
  padding: 8px;
  border: none;
  border-radius: 6px;
  width: 80px;
  text-align: center;
  margin-right: 5px;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  margin: 2px;
  cursor: pointer;
  background: #00c6ff;
  color: black;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #0072ff;
  color: white;
  transform: scale(1.05);
}

/* Grid Container */
.container {
  display: grid;
  gap: 15px;
  margin-top: 25px;
  padding: 10px;
}

/* Column Cards */
.column {
  padding: 25px;
  border-radius: 12px;
  color: white;
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.column:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.6);
}

.column button {
  margin-top: 10px;
  background: white;
  color: black;
  font-size: 12px;
}

.column button:hover {
  background: black;
  color: white;
}
    
  </style>
</head>

<body>

<h2>Column Manager</h2>

<input type="number" id="colInput" value="3" min="1">
<button onclick="increase()">+</button>
<button onclick="decrease()">-</button>

<div id="container" class="container"></div>

<script>
let numColumns = 3;

let columns = [
  { title: "Column 1", color: "pink" },
  { title: "Column 2", color: "lavender" },
  { title: "Column 3", color: "lightblue" }
];

const container = document.getElementById("container");
const input = document.getElementById("colInput");

function render() {
  container.innerHTML = "";

  container.style.gridTemplateColumns = `repeat(${numColumns}, 1fr)`;

  columns.forEach((col, index) => {
    let div = document.createElement("div");
    div.className = "column";
    div.style.backgroundColor = col.color;
    div.draggable = true;

    div.innerHTML = `
      <h3>${col.title}</h3>
      <button onclick="editColumn(${index})">Edit</button>
    `;

    // Drag start
    div.ondragstart = (e) => {
      e.dataTransfer.setData("index", index);
    };

    // Allow drop
    div.ondragover = (e) => e.preventDefault();

    // Drop swap
    div.ondrop = (e) => {
      let from = e.dataTransfer.getData("index");

      let temp = columns[from];
      columns[from] = columns[index];
      columns[index] = temp;

      render();
    };

    container.appendChild(div);
  });
}

function increase() {
  numColumns++;
  columns.push({ title: "New Column", color: "#333" });
  input.value = numColumns;
  render();
}

function decrease() {
  if (numColumns > 1) {
    numColumns--;
    columns.pop();
    input.value = numColumns;
    render();
  }
}

input.addEventListener("change", () => {
  numColumns = parseInt(input.value);

  while (columns.length < numColumns) {
    columns.push({ title: "New Column", color: "#555" });
  }

  columns = columns.slice(0, numColumns);

  render();
});

function editColumn(index) {
  let newTitle = prompt("Enter Title:", columns[index].title);
  let newColor = prompt("Enter Color:", columns[index].color);

  if (newTitle) columns[index].title = newTitle;
  if (newColor) columns[index].color = newColor;

  render();
}

render();
</script>

</body>
</html>
