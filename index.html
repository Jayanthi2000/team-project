<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            text-align: center;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .task-card {
            background: #fafafa;
            border: 1px solid #ddd;
            padding: 15px;
            margin-top: 10px;
            border-radius: 8px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .actions button {
            width: 48%;
            margin-top: 10px;
        }

        .delete-btn {
            background: red;
        }

        .update-btn {
            background: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Task Manager</h1>

    <input type="text" id="name" placeholder="Task Name">
    <input type="text" id="description" placeholder="Description">
    <input type="text" id="assignedTo" placeholder="Assigned To">
    <input type="date" id="dueDate">

    <select id="status">
        <option value="">Select Status</option>
        <option value="TODO">TODO</option>
        <option value="IN PROGRESS">IN PROGRESS</option>
        <option value="DONE">DONE</option>
    </select>

    <button id="submitButton">Save</button>

    <div id="tasksList"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let editTaskId = null;

const nameInput = document.getElementById("name");
const descriptionInput = document.getElementById("description");
const assignedToInput = document.getElementById("assignedTo");
const dueDateInput = document.getElementById("dueDate");
const statusInput = document.getElementById("status");
const submitButton = document.getElementById("submitButton");
const tasksList = document.getElementById("tasksList");

function saveToLocalStorage() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function displayTasks() {
    tasksList.innerHTML = "";

    tasks.forEach(task => {
        tasksList.innerHTML += `
            <div class="task-card">
                <h3>${task.name}</h3>
                <p>${task.description}</p>
                <p><b>Assigned To:</b> ${task.assignedTo}</p>
                <p><b>Due Date:</b> ${task.dueDate}</p>
                <p><b>Status:</b> ${task.status}</p>

                <div class="actions">
                    <button class="update-btn" onclick="editTask(${task.id})">Edit</button>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
                </div>
            </div>
        `;
    });
}

function validateForm() {
    if (
        nameInput.value.trim() === "" ||
        descriptionInput.value.trim() === "" ||
        assignedToInput.value.trim() === "" ||
        dueDateInput.value.trim() === "" ||
        statusInput.value.trim() === ""
    ) {
        alert("Please fill all fields");
        return false;
    }
    return true;
}

submitButton.addEventListener("click", function () {
    if (!validateForm()) return;

    const taskData = {
        id: editTaskId ? editTaskId : Date.now(),
        name: nameInput.value,
        description: descriptionInput.value,
        assignedTo: assignedToInput.value,
        dueDate: dueDateInput.value,
        status: statusInput.value
    };

    if (editTaskId) {
        tasks = tasks.map(task => task.id === editTaskId ? taskData : task);
        editTaskId = null;
        submitButton.innerText = "Save";
    } else {
        tasks.push(taskData);
    }

    saveToLocalStorage();
    displayTasks();
    clearForm();
});

function editTask(id) {
    const task = tasks.find(task => task.id === id);

    if (task) {
        nameInput.value = task.name;
        descriptionInput.value = task.description;
        assignedToInput.value = task.assignedTo;
        dueDateInput.value = task.dueDate;
        statusInput.value = task.status;

        editTaskId = id;
        submitButton.innerText = "Update";
    }
}

function deleteTask(id) {
    tasks = tasks.filter(task => task.id !== id);
    saveToLocalStorage();
    displayTasks();
}

function clearForm() {
    nameInput.value = "";
    descriptionInput.value = "";
    assignedToInput.value = "";
    dueDateInput.value = "";
    statusInput.value = "";
}

displayTasks();
</script>

</body>
</html>
