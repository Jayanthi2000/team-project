<body>

<h2>Column Manager</h2>

<input type="number" id="colInput" value="3" min="1">
<button onclick="increase()">+</button>
<button onclick="decrease()">-</button>

<div id="container" class="container"></div>

<script>
let numColumns = 3;

let columns = [
  { title: "Column 1", color: "pink" },
  { title: "Column 2", color: "lavender" },
  { title: "Column 3", color: "lightblue" }
];

const container = document.getElementById("container");
const input = document.getElementById("colInput");

function render() {
  container.innerHTML = "";

  container.style.gridTemplateColumns = `repeat(${numColumns}, 1fr)`;

  columns.forEach((col, index) => {
    let div = document.createElement("div");
    div.className = "column";
    div.style.backgroundColor = col.color;
    div.draggable = true;

    div.innerHTML = `
      <h3>${col.title}</h3>
      <button onclick="editColumn(${index})">Edit</button>
    `;

    // Drag start
    div.ondragstart = (e) => {
      e.dataTransfer.setData("index", index);
    };

    // Allow drop
    div.ondragover = (e) => e.preventDefault();

    // Drop swap
    div.ondrop = (e) => {
      let from = e.dataTransfer.getData("index");

      let temp = columns[from];
      columns[from] = columns[index];
      columns[index] = temp;

      render();
    };

    container.appendChild(div);
  });
}

function increase() {
  numColumns++;
  columns.push({ title: "New Column", color: "#333" });
  input.value = numColumns;
  render();
}

function decrease() {
  if (numColumns > 1) {
    numColumns--;
    columns.pop();
    input.value = numColumns;
    render();
  }
}

input.addEventListener("change", () => {
  numColumns = parseInt(input.value);

  while (columns.length < numColumns) {
    columns.push({ title: "New Column", color: "#555" });
  }

  columns = columns.slice(0, numColumns);

  render();
});

function editColumn(index) {
  let newTitle = prompt("Enter Title:", columns[index].title);
  let newColor = prompt("Enter Color:", columns[index].color);

  if (newTitle) columns[index].title = newTitle;
  if (newColor) columns[index].color = newColor;

  render();
}
