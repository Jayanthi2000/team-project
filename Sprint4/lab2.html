<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      min-height: 100vh;
    }

    .header {
      color: white;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .card {
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .task-card {
      transition: 0.3s;
    }

    .task-card:hover {
      transform: scale(1.02);
    }

    .badge-TODO { background: gray; }
    .badge-INPROGRESS { background: orange; }
    .badge-REVIEW { background: purple; }
    .badge-DONE { background: green; }
  </style>
</head>

<body>

<div class="container mt-5">

  <h2 class="text-center mb-4 header">
    <i class="bi bi-check2-square"></i> Task Manager
  </h2>

  <!-- FORM -->
  <div class="card p-3 mb-4">
    <form id="taskForm">

      <input class="form-control mb-2" id="name" placeholder="Task Name">
      <input class="form-control mb-2" id="desc" placeholder="Description">
      <input class="form-control mb-2" id="assigned" placeholder="Assigned To">
      <input class="form-control mb-2" type="date" id="date">

      <select class="form-select mb-2" id="status">
        <option value="">Select Status</option>
        <option>TODO</option>
        <option>IN PROGRESS</option>
        <option>REVIEW</option>
        <option>DONE</option>
      </select>

      <button class="btn btn-dark w-100">
        <i class="bi bi-plus-circle"></i> Add Task
      </button>

      <p class="text-danger mt-2" id="error"></p>

    </form>
  </div>

  <!-- TASK LIST -->
  <div id="list"></div>

</div>

<script>
document.getElementById("taskForm").addEventListener("submit", function(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let desc = document.getElementById("desc").value;
  let assigned = document.getElementById("assigned").value;
  let date = document.getElementById("date").value;
  let status = document.getElementById("status").value;

  let error = document.getElementById("error");

  if(!name || !desc || !assigned || !date || !status){
    error.innerText = "All fields required!";
    return;
  }

  error.innerText = "";

  let statusClass = status.replace(" ", "");

  document.getElementById("list").innerHTML += `
    <div class="card p-3 mb-3 task-card">
      <h5><i class="bi bi-list-task"></i> ${name}</h5>
      <p>${desc}</p>
      <small><i class="bi bi-person"></i> ${assigned}</small><br>
      <small><i class="bi bi-calendar"></i> ${date}</small><br><br>
      <span class="badge badge-${statusClass}">${status}</span>
    </div>
  `;

  this.reset();
});
</script>

</body>
</html>
